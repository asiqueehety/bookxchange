spring.application.name=bookxchange

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookxchange}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:amarn44m451QU3}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

# Session Configuration
# Use in-memory sessions for Render compatibility (avoids JDBC session DB init issues)
spring.session.store-type=memory
server.servlet.session.timeout=30m

# Logging
logging.level.root=INFO
logging.level.com.example.bookxchange=DEBUG



spring.security.user.name=admin
spring.security.user.password=admin

# File Upload Configuration
app.upload.dir=uploads/profiles
app.upload.max-size=5242880
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

