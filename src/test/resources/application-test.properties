# H2 In-Memory Database for Testing (CI will override via environment variables)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

# Session Configuration - Use NONE for tests (no persistent sessions needed)
spring.session.store-type=none

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.maximum-pool-size=5

# Logging
logging.level.root=INFO
logging.level.com.example.bookxchange=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.test=DEBUG

# Security defaults for testing
spring.security.user.name=admin
spring.security.user.password=admin

# Disable lazy initialization for tests
spring.lazy-initialization=false
